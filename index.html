<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Verify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-2xl mx-auto" id="app"></div>

  <script>
    const socket = io();
    let sessionId = window.location.pathname.split('/session/')[1];
    let holderToken = new URLSearchParams(window.location.search).get('holder');

    function render() {
      const app = document.getElementById('app');

      if (!sessionId) {
        app.innerHTML = `
          <div class="text-center">
            <h1 class="text-4xl font-bold mb-4">Secret Verify</h1>
            <button onclick="createSession()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold mt-8">
              Create New Session (Holder)
            </button>
          </div>
        `;
        return;
      }

      // Check if holder
      fetch(`/api/session/${sessionId}`, {
        headers: holderToken ? { 'Authorization': `Bearer ${holderToken}` } : {}
      })
      .then(r => r.json())
      .then(data => {
        const isHolder = data.isHolder || !!holderToken;

        if (isHolder) {
          app.innerHTML = `
            <div class="bg-zinc-900 p-8 rounded-3xl">
              <h2 class="text-2xl font-bold mb-6 text-emerald-400">Holder Dashboard</h2>
              <p class="text-zinc-400">Session ID: ${sessionId}</p>
              <p class="mt-8 text-zinc-400">Waiting for customer to submit email...</p>
              <button onclick="location.reload()" class="mt-8 w-full bg-zinc-700 py-4 rounded-2xl">Refresh Status</button>
            </div>
          `;
        } else {
          // Customer view
          app.innerHTML = `
            <div class="bg-zinc-900 p-8 rounded-3xl">
              <h2 class="text-xl font-semibold mb-6">Verify Your Identity</h2>
              <input id="customer-email" type="email" placeholder="your@email.com" 
                     class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg mb-6">
              <button onclick="submitCustomerEmail()" 
                      class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl text-lg font-semibold">
                Submit Email
              </button>
            </div>
          `;
        }
      })
      .catch(() => {
        app.innerHTML = `<p class="text-red-500">Error loading session. Please refresh.</p>`;
      });
    }

    function createSession() {
      const code = prompt("Enter the secret code you will share with customer (e.g. ABC-1234-XYZ):");
      if (!code) return;

      fetch('/api/create-session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ secretCode: code })
      })
      .then(r => r.json())
      .then(data => {
        window.location.href = `/session/\( {data.sessionId}?holder= \){data.holderToken}`;
      });
    }

    function submitCustomerEmail() {
      const emailInput = document.getElementById('customer-email');
      const email = emailInput ? emailInput.value.trim() : '';
      if (!email) {
        alert("Please enter your email");
        return;
      }

      fetch(`/api/session/${sessionId}/customer-email`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      })
      .then(() => {
        alert("Email submitted successfully! Waiting for holder approval.");
      })
      .catch(() => alert("Failed to submit email"));
    }

    // Load once
    render();

    // Gentle polling - every 5 seconds instead of 2
    setInterval(() => {
      if (sessionId) render();
    }, 5000);

    console.log("✅ Secret Verify loaded");
  </script>
</body>
</html>
