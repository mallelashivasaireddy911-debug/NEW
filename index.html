<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Verify - CLEAN-TEST-0423</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-2xl mx-auto text-center py-12">
    <h1 class="text-5xl font-bold text-emerald-400 mb-8">Secret Verify - CLEAN-TEST-0423</h1>
    <p class="text-zinc-400 mb-8">If you see this title, the cache is cleared and new file is live.</p>
    
    <button onclick="createSession()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-2xl font-semibold">
      Create New Session (Holder)
    </button>
  </div>

  <script>
    function createSession() {
      const code = prompt("Enter secret code (e.g. TEST456):");
      if (!code) return;

      fetch('/api/create-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secretCode: code })
      })
      .then(r => r.json())
      .then(data => {
        window.location.href = `/session/\( {data.sessionId}?holder= \){data.holderToken}`;
      })
      .catch(err => alert("Failed: " + err.message));
    }
  </script>
</body>
</html>
