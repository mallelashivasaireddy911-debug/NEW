<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Verify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-2xl mx-auto" id="app"></div>

  <script>
    const socket = io();
    let sessionId = window.location.pathname.split('/session/')[1];
    let holderToken = new URLSearchParams(window.location.search).get('holder');
    let isHolder = false;

    function render() {
      const app = document.getElementById('app');
      let html = `<h1 class="text-3xl font-bold text-center mb-8">Secret Verify</h1>`;

      if (!sessionId) {
        html += `
          <button onclick="createSession()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-6 rounded-3xl text-xl font-semibold">
            Create New Session (Holder)
          </button>
        `;
      } else {
        html += `<div class="text-center text-sm text-zinc-500 mb-4">Session: ${sessionId}</div>`;
        
        // Fetch state to decide view
        fetch(`/api/session/${sessionId}`, {
          headers: holderToken ? {'Authorization': `Bearer ${holderToken}`} : {}
        })
        .then(r => r.json())
        .then(data => {
          isHolder = data.isHolder || !!holderToken;
          if (isHolder) {
            renderHolderView();
          } else {
            renderCustomerView();
          }
        }).catch(() => renderCustomerView());
      }
      app.innerHTML = html;
    }

    function createSession() {
      const code = prompt("Enter the secret code you will share with customer (e.g. ABC-1234-XYZ):");
      if (!code) return;

      fetch('/api/create-session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ secretCode: code })
      })
      .then(r => r.json())
      .then(data => {
        window.location.href = `/session/\( {data.sessionId}?holder= \){data.holderToken}`;
      });
    }

    function renderHolderView() {
      document.getElementById('app').innerHTML = `
        <div class="bg-zinc-900 p-8 rounded-3xl">
          <h2 class="text-2xl font-bold mb-6 text-emerald-400">Holder Controls</h2>
          <p class="text-zinc-400 mb-8">Waiting for customer to join and submit email...</p>
          <button onclick="location.reload()" class="w-full bg-zinc-700 py-4 rounded-2xl">Refresh</button>
        </div>
      `;
    }

    function renderCustomerView() {
      document.getElementById('app').innerHTML = `
        <div class="bg-zinc-900 p-8 rounded-3xl">
          <h2 class="text-xl font-semibold mb-6">Verify Your Identity</h2>
          <input id="email" type="email" placeholder="your@email.com" 
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 text-lg">
          <button onclick="submitEmail()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl text-lg font-semibold">
            Submit Email
          </button>
        </div>
      `;
    }

    function submitEmail() {
      const email = document.getElementById('email').value.trim();
      if (!email) return alert("Enter email");

      fetch(`/api/session/${sessionId}/customer-email`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email })
      }).then(() => alert("Email submitted. Waiting for holder approval."));
    }

    // Initial load
    render();
    setInterval(() => {
      if (sessionId) render();
    }, 3000);

    console.log("Secret Verify loaded");
  </script>
</body>
</html>
